<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sector Scope</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#121212; color:white;}
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; background:#1a1a1a; border-bottom:2px solid #E10600;}
    .logo { font-weight:bold; font-size:20px; letter-spacing:1px;}
    .nav-links a { margin:0 12px; text-decoration:none; color:#ccc;}
    .nav-links a:hover { color:white;}
    .hero { padding:60px 32px; text-align:center;}
    .section { padding:40px 32px;}
    .card { background:#1e1e1e; padding:20px; border-radius:12px; margin-top:10px;}
    .row { padding:6px 0; border-bottom:1px solid #333;}
    footer { text-align:center; padding:20px; color:#888;}
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">SECTOR SCOPE</div>
  <nav class="nav-links">
    <a href="#">Home</a>
    <a href="#">Drivers</a>
    <a href="#">Teams</a>
    <a href="#">Races</a>
    <a href="#">News</a>
  </nav>
  <div>Next Race: Coming Soon</div>
</header>

<section class="hero">
  <h1>Next Race</h1>
  <p>Loading race info...</p>
</section>

<section class="section">
  <h2>Driver Standings</h2>
  <div id="driver" class="card">Loading...</div>
</section>

<section class="section">
  <h2>Constructor Standings</h2>
  <div id="constructor" class="card">Loading...</div>
</section>

<footer>
  <p>Data provided by community F1 APIs</p>
</footer>

<script>
async function loadDrivers() {
  const container = document.getElementById("driver");
  try {
    const res = await fetch("https://api.jolpi.ca/f1/current/driverStandings.json");
    const data = await res.json();
    const list = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
    container.innerHTML = "";
    list.slice(0,10).forEach(d => {
      const div = document.createElement("div");
      div.className = "row";
      div.innerText = d.position + ". " + d.Driver.familyName + " - " + d.points + " pts";
      container.appendChild(div);
    });
  } catch(e) {
    container.innerText = "Failed to load data";
  }
}

async function loadConstructors() {
  const container = document.getElementById("constructor");
  try {
    const res = await fetch("https://api.jolpi.ca/f1/current/constructorStandings.json");
    const data = await res.json();
    const list = data.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
    container.innerHTML = "";
    list.slice(0,10).forEach(t => {
      const div = document.createElement("div");
      div.className = "row";
      div.innerText = t.position + ". " + t.Constructor.name + " - " + t.points + " pts";
      container.appendChild(div);
    });
  } catch(e) {
    container.innerText = "Failed to load data";
  }
}

loadDrivers();
loadConstructors();
</script>

</body>
</html>
