<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sector Scope</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#121212; color:white;}
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; background:#1a1a1a; border-bottom:2px solid #E10600;}
    .logo { font-weight:bold; font-size:20px;}
    .nav-links a { margin:0 12px; text-decoration:none; color:#ccc;}
    .nav-links a:hover { color:white;}
    .section { padding:40px 32px;}
    .card { background:#1e1e1e; padding:20px; border-radius:12px;}
    .table { width:100%; border-collapse:collapse;}
    .table th, .table td { padding:10px; text-align:left;}
    .table th { color:#aaa; border-bottom:1px solid #333;}
    .table tr { border-bottom:1px solid #333;}
    .form-row { margin:8px 0;}
    footer { text-align:center; padding:20px; color:#888;}
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">SECTOR SCOPE</div>
  <nav class="nav-links">
    <a href="#">Home</a>
    <a href="#">Drivers</a>
    <a href="#">Teams</a>
    <a href="#">Races</a>
    <a href="#">News</a>
  </nav>
  <div>Next Race: Coming Soon</div>
</header>

<section class="section">
  <h2>Driver Standings</h2>
  <div class="card">
    <table class="table" id="driverTable">
      <thead>
        <tr><th>Pos</th><th>Driver</th><th>Points</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<section class="section">
  <h2>Constructor Standings</h2>
  <div class="card">
    <table class="table" id="constructorTable">
      <thead>
        <tr><th>Pos</th><th>Team</th><th>Points</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<section class="section">
  <h2>Driver Form (Last 5 Races)</h2>
  <div class="card" id="form"></div>
</section>

<footer>
  <p>Data provided by community F1 APIs</p>
</footer>

<script>
async function loadDrivers() {
  const res = await fetch("https://api.jolpi.ca/f1/current/driverStandings.json");
  const data = await res.json();
  const list = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
  const tbody = document.querySelector("#driverTable tbody");
  tbody.innerHTML = "";
  list.slice(0,10).forEach(d => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${d.position}</td><td>${d.Driver.familyName}</td><td>${d.points}</td>`;
    tbody.appendChild(row);
  });
}

async function loadConstructors() {
  const res = await fetch("https://api.jolpi.ca/f1/current/constructorStandings.json");
  const data = await res.json();
  const list = data.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
  const tbody = document.querySelector("#constructorTable tbody");
  tbody.innerHTML = "";
  list.slice(0,10).forEach(t => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${t.position}</td><td>${t.Constructor.name}</td><td>${t.points}</td>`;
    tbody.appendChild(row);
  });
}

async function loadForm() {
  const container = document.getElementById("form");
  container.innerHTML = "Loading...";
  try {
    const res = await fetch("https://api.jolpi.ca/f1/current/last/5/results.json");
    const data = await res.json();
    const races = data.MRData.RaceTable.Races;

    const formMap = {};

    races.forEach(race => {
      race.Results.forEach(result => {
        const name = result.Driver.familyName;
        if (!formMap[name]) formMap[name] = [];
        formMap[name].push(result.position);
      });
    });

    container.innerHTML = "";
    Object.entries(formMap).slice(0,10).forEach(([driver, results]) => {
      const div = document.createElement("div");
      div.className = "form-row";
      div.innerText = driver + " → " + results.join(" ");
      container.appendChild(div);
    });

  } catch {
    container.innerText = "Form data unavailable";
  }
}

loadDrivers();
loadConstructors();
loadForm();
</script>

</body>
</html>
