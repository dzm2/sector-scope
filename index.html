<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sector Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Inter',sans-serif; background:#121212; color:white; }
.header { background:#121212; padding:24px; border-bottom:2px solid #E10600; }
.logo { height:80px; }
.content { padding:20px 24px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.card { background:#1e1e1e; padding:14px; border-radius:10px; }
.table td { padding:6px; }
</style>
</head>
<body>

<header class="header">
  <img class="logo" src="sector_scope_logo_transparent.png">
</header>

<div class="content">
<div class="grid">

<div class="card">
<h3>Driver Standings</h3>
<table class="table" id="driverTable"><tbody></tbody></table>
</div>

<div class="card">
<h3>Constructor Standings</h3>
<table class="table" id="constructorTable"><tbody></tbody></table>
</div>

</div>
</div>

<script>
async function load(){
let d=await fetch("https://api.jolpi.ca/ergast/f1/current/driverStandings.json").then(r=>r.json());
let c=await fetch("https://api.jolpi.ca/ergast/f1/current/constructorStandings.json").then(r=>r.json());

let drivers=d.MRData.StandingsTable.StandingsLists[0].DriverStandings;
let constructors=c.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;

let dt=document.querySelector("#driverTable tbody");
drivers.slice(0,10).forEach(x=>{
let tr=document.createElement("tr");
tr.innerHTML=`<td>${x.position}</td><td>${x.Driver.familyName}</td><td>${x.points}</td>`;
dt.appendChild(tr);
});

let ct=document.querySelector("#constructorTable tbody");
constructors.forEach(x=>{
let tr=document.createElement("tr");
tr.innerHTML=`<td>${x.position}</td><td>${x.Constructor.name}</td><td>${x.points}</td>`;
ct.appendChild(tr);
});
}
load();
</script>

</body>
</html>
