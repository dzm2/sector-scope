<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sector Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Inter',sans-serif; background:#121212; color:white;}
.navbar {display:flex; justify-content:space-between; padding:16px 32px; background:#1a1a1a; border-bottom:2px solid #E10600;}
.section {padding:40px 32px;}
.card {background:#1e1e1e; padding:20px; border-radius:12px;}
.grid {display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.table td {padding:10px;}
.driver-cell {display:flex; align-items:center; gap:8px;}
.color-bar {width:4px; height:18px; border-radius:2px;}
.error {color:#ff6b6b; padding:10px;}
</style>
</head>
<body>

<header class="navbar">
<div>SECTOR SCOPE</div>
<div>Live</div>
</header>

<section class="section grid">
<div class="card">
<h3>Driver Standings</h3>
<div id="driverError" class="error"></div>
<table class="table" id="driverTable"><tbody></tbody></table>
</div>

<div class="card">
<h3>Constructor Standings</h3>
<div id="constructorError" class="error"></div>
<table class="table" id="constructorTable"><tbody></tbody></table>
</div>
</section>

<script>
const teamColors = {
"Red Bull Racing": "#1E41FF",
"Ferrari": "#DC0000",
"Mercedes": "#00D2BE",
"McLaren": "#FF8700",
"Aston Martin": "#006F62",
"Alpine": "#0090FF",
"Williams": "#005AFF",
"RB F1 Team": "#2B4562",
"Kick Sauber": "#52E252",
"Haas F1 Team": "#FFFFFF"
};

function getTeamColor(name){
return teamColors[name] || "#666";
}

async function safeFetch(url){
try{
const res = await fetch(url);
const text = await res.text();

try{
return JSON.parse(text);
}catch{
console.error("Invalid JSON:", text);
return null;
}

}catch(e){
console.error("Fetch failed:", e);
return null;
}
}

async function load(){
const driverData = await safeFetch("https://api.jolpi.ca/f1/current/driverStandings.json");
const constructorData = await safeFetch("https://api.jolpi.ca/f1/current/constructorStandings.json");

const dBody = document.querySelector("#driverTable tbody");
const cBody = document.querySelector("#constructorTable tbody");

dBody.innerHTML="";
cBody.innerHTML="";

if(!driverData){
document.getElementById("driverError").innerText = "Driver data unavailable";
} else {
const drivers = driverData?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || [];
drivers.slice(0,10).forEach(d=>{
const team = d.Constructors?.[0]?.name || "";
const color = getTeamColor(team);

const tr = document.createElement("tr");
tr.innerHTML = `
<td>${d.position || "-"}</td>
<td class="driver-cell">
<div class="color-bar" style="background:${color}"></div>
<span>${d.Driver?.familyName || "Unknown"}</span>
</td>
<td>${d.points || "-"}</td>
`;
dBody.appendChild(tr);
});
}

if(!constructorData){
document.getElementById("constructorError").innerText = "Constructor data unavailable";
} else {
const teams = constructorData?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || [];
teams.slice(0,10).forEach(t=>{
const name = t.Constructor?.name || "Unknown";
const color = getTeamColor(name);

const tr = document.createElement("tr");
tr.innerHTML = `
<td>${t.position || "-"}</td>
<td class="driver-cell">
<div class="color-bar" style="background:${color}"></div>
<span>${name}</span>
</td>
<td>${t.points || "-"}</td>
`;
cBody.appendChild(tr);
});
}
}

load();
</script>

</body>
</html>
