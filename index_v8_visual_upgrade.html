<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sector Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family: 'Inter', sans-serif; background:#121212; color:white;}
.navbar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; background:#1a1a1a; border-bottom:2px solid #E10600;}
.logo { font-weight:600; font-size:20px;}
.section { padding:40px 32px;}
.hero { padding:60px 32px; text-align:center; border-bottom:1px solid #333;}
.big { font-size:34px; margin:10px 0;}
.card { background:#1e1e1e; padding:24px; border-radius:14px;}
.grid { display:grid; grid-template-columns:1fr 1fr; gap:24px;}
.table { width:100%; border-collapse:collapse;}
.table td { padding:12px 8px;}
.table tr { border-bottom:1px solid #333;}

.driver-cell {
display:flex;
align-items:center;
gap:10px;
}

.color-bar {
width:4px;
height:20px;
border-radius:3px;
}

.form-box { display:inline-block; width:26px; height:26px; line-height:26px; text-align:center; border-radius:6px; margin-right:5px; font-size:13px; font-weight:600;}
.g { background:#1f7a1f;}
.y { background:#b59f00;}
.o { background:#b36b00;}
.r { background:#a00000;}

footer { text-align:center; padding:20px; color:#888;}
</style>
</head>
<body>

<header class="navbar">
<div class="logo">SECTOR SCOPE</div>
<div id="countdown">Loading...</div>
</header>

<section class="hero">
<div class="big" id="raceName">Loading...</div>
<div id="raceTime"></div>
</section>

<section class="section grid">
<div class="card">
<h3>Driver Standings</h3>
<table class="table" id="driverTable"><tbody></tbody></table>
</div>

<div class="card">
<h3>Constructor Standings</h3>
<table class="table" id="constructorTable"><tbody></tbody></table>
</div>
</section>

<section class="section">
<div class="card">
<h3>Driver Form</h3>
<div id="form"></div>
</div>
</section>

<footer>Data provided by APIs</footer>

<script>
const teamColors = {
"Red Bull": "#1E41FF",
"Ferrari": "#DC0000",
"Mercedes": "#00D2BE",
"McLaren": "#FF8700",
"Aston Martin": "#006F62",
"Alpine": "#0090FF",
"Williams": "#005AFF",
"RB": "#2B4562",
"Sauber": "#52E252",
"Haas": "#FFFFFF"
};

function getTeamColor(name){
for (let key in teamColors){
if(name.includes(key)) return teamColors[key];
}
return "#888";
}

function getClass(p){
p=parseInt(p);
if(p<=3)return "g";
if(p<=6)return "y";
if(p<=10)return "o";
return "r";
}

async function loadStandings(){
let d=await fetch("https://api.jolpi.ca/f1/current/driverStandings.json").then(r=>r.json());
let drivers=d.MRData.StandingsTable.StandingsLists[0].DriverStandings;
let tbody=document.querySelector("#driverTable tbody");
tbody.innerHTML="";
drivers.slice(0,10).forEach(x=>{
let color=getTeamColor(x.Constructors[0].name);
let tr=document.createElement("tr");
tr.innerHTML=`<td>${x.position}</td>
<td class="driver-cell">
<div class="color-bar" style="background:${color}"></div>
${x.Driver.familyName}
</td>
<td>${x.points}</td>`;
tbody.appendChild(tr);
});

let c=await fetch("https://api.jolpi.ca/f1/current/constructorStandings.json").then(r=>r.json());
let teams=c.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
let tbody2=document.querySelector("#constructorTable tbody");
tbody2.innerHTML="";
teams.slice(0,10).forEach(x=>{
let color=getTeamColor(x.Constructor.name);
let tr=document.createElement("tr");
tr.innerHTML=`<td>${x.position}</td>
<td class="driver-cell">
<div class="color-bar" style="background:${color}"></div>
${x.Constructor.name}
</td>
<td>${x.points}</td>`;
tbody2.appendChild(tr);
});
}

async function loadForm(){
let container=document.getElementById("form");
container.innerHTML="";
let res=await fetch("https://api.jolpi.ca/f1/current/results.json?limit=100").then(r=>r.json());
let races=res.MRData.RaceTable.Races.slice(-5);
let map={};

races.forEach(r=>{
r.Results.forEach(x=>{
let n=x.Driver.familyName;
if(!map[n])map[n]=[];
map[n].push(x.position);
});
});

Object.entries(map).slice(0,10).forEach(([d,arr])=>{
let row=document.createElement("div");
row.innerHTML="<b>"+d+"</b> ";
arr.forEach(p=>{
let s=document.createElement("span");
s.className="form-box "+getClass(p);
s.innerText=p;
row.appendChild(s);
});
container.appendChild(row);
});
}

async function loadRace(){
let res=await fetch("https://api.openf1.org/v1/sessions?session_name=Race").then(r=>r.json());
let now=new Date();
let next=res.find(s => new Date(s.date_start) > now);

if(!next){
document.getElementById("raceName").innerText="No upcoming race";
return;
}

let date=new Date(next.date_start);
let name = next.meeting_name || next.location || "Upcoming Race";

document.getElementById("raceName").innerText=name;
document.getElementById("raceTime").innerText=date.toUTCString();

function update(){
let diff=date-new Date();
if(diff<=0)return;
let d=Math.floor(diff/86400000);
let h=Math.floor(diff%86400000/3600000);
let m=Math.floor(diff%3600000/60000);
document.getElementById("countdown").innerText=`${d}d ${h}h ${m}m`;
}
setInterval(update,60000);
update();
}

loadStandings();
loadForm();
loadRace();
</script>

</body>
</html>
